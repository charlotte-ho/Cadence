let _logoId = 0;
function CadenceLogo({ size=28, dark=false }) {
  const idRef = useRef(null);
  if (!idRef.current) idRef.current = `clogo${++_logoId}`;
  const id = idRef.current;
  const col = dark ? T.blueLt : T.navy;
  const sw = size * 0.118, r = size * 0.275, d = size * 0.225, m = size / 2;
  const rings = [{x:m,y:m-d},{x:m+d,y:m},{x:m,y:m+d},{x:m-d,y:m}];
  const cr = r + sw * 0.5;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} fill="none" style={{display:"block",flexShrink:0}}>
      <defs>{rings.map((rg,i)=><clipPath key={i} id={`${id}${i}`}><circle cx={rg.x} cy={rg.y} r={cr}/></clipPath>)}</defs>
      {rings.map((rg,i)=><circle key={`b${i}`} cx={rg.x} cy={rg.y} r={r} stroke={col} strokeWidth={sw}/>)}
      {rings.map((rg,i)=><circle key={`w${i}`} cx={rg.x} cy={rg.y} r={r} stroke={col} strokeWidth={sw} clipPath={`url(#${id}${(i+1)%4})`}/>)}
    </svg>
  );
}

function Pill({label,color,pulse=false,small=false}) {

function LineChart({datasets,h=150,zones=false}) {
  const W=520,H=h,pad={t:10,r:10,b:24,l:36};
  const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b,min=50,max=130;
  const tx=i=>pad.l+(i/23)*cw, ty=v=>pad.t+((max-v)/(max-min))*ch;
  const mkP=vals=>vals.map((v,i)=>`${i===0?"M":"L"}${tx(i).toFixed(1)},${ty(v).toFixed(1)}`).join(" ");
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
      {[70,90,110].map(v=><line key={v} x1={pad.l} x2={W-pad.r} y1={ty(v)} y2={ty(v)} stroke={T.s3} strokeWidth="0.6"/>)}
      {[70,90,110].map(v=><text key={v} x={pad.l-4} y={ty(v)+4} fontSize="8" fill={T.muted} textAnchor="end" fontFamily={FM}>{v}</text>)}
      {[0,4,8,12,16,20,23].map(i=><text key={i} x={tx(i)} y={H-3} fontSize="8" fill={T.muted} textAnchor="middle" fontFamily={FM}>{H24[i]}</text>)}
      {zones&&<>
        <rect x={tx(16)} y={pad.t} width={tx(20)-tx(16)} height={ch} fill={T.orange} fillOpacity=".06"/>
        <text x={(tx(16)+tx(20))/2} y={pad.t+10} fontSize="7" fill={T.orange} fillOpacity=".7" textAnchor="middle" fontFamily={FM}>PEAK</text>
        <rect x={tx(21)} y={pad.t} width={tx(23)-tx(21)} height={ch} fill={T.red} fillOpacity=".06"/>
        <text x={(tx(21)+tx(23))/2} y={pad.t+10} fontSize="7" fill={T.red} fillOpacity=".6" textAnchor="middle" fontFamily={FM}>REBOUND</text>
      </>}
      {datasets.map((ds,i)=><path key={i} d={mkP(ds.values)} fill="none" stroke={ds.color} strokeWidth={ds.bold?2.5:1.5} strokeLinecap="round" strokeDasharray={ds.dashed?"5,3":"none"}/>)}
    </svg>
  );
}

function GanttChart({windows,label,labelColor}) {
  const S=18,E=32,px=h=>((h-S)/(E-S))*100;
  const ticks=[18,20,22,0,2,4,6,8];
  const fmt=h=>h===0?"12am":h<12?`${h}am`:h===12?"12pm":h>12?`${h-12}pm`:`${h}pm`;
  return (
    <div>
      <div style={{fontSize:9,fontWeight:700,color:labelColor||T.muted,fontFamily:FM,letterSpacing:1,marginBottom:6}}>{label}</div>
      <div style={{position:"relative",height:14,marginBottom:8}}>
        {ticks.map(h=>{const ha=h<18?h+24:h;return <div key={h} style={{position:"absolute",left:`${px(ha)}%`,transform:"translateX(-50%)",fontSize:7.5,color:T.muted,fontFamily:FM,borderLeft:`1px solid ${T.s3}`,paddingLeft:2}}>{fmt(h)}</div>;})}
      </div>
      {windows.map((w,i)=>{
        const sa=w.start<18?w.start+24:w.start,ea=w.end<18?w.end+24:w.end;
        const left=px(sa),width=px(ea)-left;
        return (
          <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
            <div style={{width:124,display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
              <div style={{width:5,height:5,borderRadius:"50%",background:w.color,flexShrink:0}}/>
              <span style={{fontSize:8.5,color:T.textDim,fontFamily:FM,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{w.site}</span>
            </div>
            <div style={{flex:1,position:"relative",height:20,background:T.s2,borderRadius:3}}>
              <div style={{position:"absolute",left:`${left}%`,width:`${width}%`,height:"100%",background:`${w.color}28`,border:`1px solid ${w.color}`,borderRadius:3,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <span style={{fontSize:7.5,color:w.color,fontFamily:FM,fontWeight:600,whiteSpace:"nowrap"}}>{w.mw} MW</span>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function DispatchCalendar() {
  const [selectedEvent,setSelectedEvent]=useState(null);
  const totalEarned=Q1_EVENTS.reduce((s,e)=>s+e.earned,0);
  const avgPerEvent=Math.round(totalEarned/Q1_EVENTS.length);
  const eventMap=Object.fromEntries(Q1_EVENTS.map(e=>[e.date,e]));
  const months=[
    {name:"January",year:2026,month:0,startDay:4,days:31},
    {name:"February",year:2026,month:1,startDay:0,days:28},
    {name:"March",year:2026,month:2,startDay:0,days:31},
  ];
  const fmtDate=(y,m,d)=>`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  return (
    <div style={{background:T.surface,borderRadius:8,border:`1px solid ${T.s2}`,padding:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div>
          <div style={{fontSize:9,color:T.muted,fontFamily:FM,letterSpacing:1.5,marginBottom:3}}>Q1 2026 · DISPATCH EVENT LOG</div>
          <div style={{fontSize:13,fontWeight:700,color:T.text,fontFamily:F}}>Grid event history</div>
        </div>
        <div style={{display:"flex",gap:12}}>
          {[{v:"14",l:"events",c:T.teal},{v:`$${(totalEarned/1000).toFixed(0)}K`,l:"earned",c:T.green},{v:`$${avgPerEvent.toLocaleString()}`,l:"avg/event",c:T.gold}].map((s,i)=>(
            <div key={i} style={{textAlign:"right"}}>
              <div style={{fontSize:16,fontWeight:800,color:s.c,fontFamily:F,lineHeight:1}}>{s.v}</div>
              <div style={{fontSize:8,color:T.muted,fontFamily:FM,marginTop:1}}>{s.l}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:12}}>
        {months.map(({name,year,month,startDay,days})=>(
          <div key={name}>
            <div style={{fontSize:9,fontWeight:700,color:T.muted,fontFamily:FM,letterSpacing:1,marginBottom:6}}>{name.toUpperCase()}</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,marginBottom:3}}>
              {["S","M","T","W","T","F","S"].map((d,i)=><div key={i} style={{fontSize:7,color:T.muted,fontFamily:FM,textAlign:"center"}}>{d}</div>)}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1}}>

function Dispatch() {
  const timerRef=useRef(null);
  const [phase,setPhase]=useState("idle");
  const [countdown,setCountdown]=useState(5);
  const [chartPct,setChartPct]=useState(0);
  const [modStep,setModStep]=useState(0);
  useEffect(()=>()=>clearInterval(timerRef.current),[]);
  const reset=()=>{clearInterval(timerRef.current);setPhase("idle");setCountdown(5);setChartPct(0);setModStep(0);};
  const trigger=()=>{
    if(phase!=="idle") return;
    setPhase("alert");
    let c=5;
    timerRef.current=setInterval(()=>{
      c--;setCountdown(c);
      if(c<=0){
        clearInterval(timerRef.current);
        setPhase("dispatching");
        MODULES.forEach((_,i)=>setTimeout(()=>setModStep(i+1),i*380));
        setTimeout(()=>{
          let p=0;
          timerRef.current=setInterval(()=>{p+=2;setChartPct(p);if(p>=100){clearInterval(timerRef.current);setPhase("done");}},40);
        },1700);
      }
    },1000);
  };
  const reboundPct=Math.round((Math.max(...REBOUND)/Math.max(...BASE)-1)*100);
  const peakSavedMW=Math.max(...BASE)-Math.max(...CADENCE.slice(16,21));
  const count=Math.max(2,Math.floor(chartPct/100*23)+1);
  const rebSlice=REBOUND.slice(0,count),cadSlice=CADENCE.slice(0,count);
  return (
    <div style={{padding:22,overflowY:"auto",height:"calc(100vh - 50px)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:14}}>
        <div>
          <div style={{fontSize:9.5,color:T.muted,fontFamily:FM,letterSpacing:2,marginBottom:4}}>DISPATCH ENGINE</div>
          <div style={{fontSize:20,fontWeight:700,color:T.text,fontFamily:F}}>Grid Event Response</div>
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <div style={{background:phase==="idle"?T.surface:`${T.red}18`,border:`1px solid ${phase==="idle"?T.s2:T.red}`,borderRadius:8,padding:"8px 14px",transition:"all 0.4s",minWidth:100,textAlign:"center"}}>
            <div style={{fontSize:8.5,color:T.muted,fontFamily:FM,marginBottom:2}}>PJM LMP</div>
            <div style={{fontSize:20,fontWeight:800,fontFamily:F,color:phase==="idle"?T.gold:T.red,transition:"color 0.4s"}}>{phase==="idle"?"$329":"$847"}<span style={{fontSize:10,color:T.muted}}>/MWh</span></div>
          </div>
          <Pill label={phase==="idle"?"GRID NORMAL":phase==="done"?"DISPATCH COMPLETE":phase==="alert"?"STRESS SIGNAL":"DISPATCHING"} color={phase==="idle"?T.green:phase==="done"?T.blue:T.red} pulse={phase==="alert"||phase==="dispatching"}/>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:12}}>
        {MODULES.map((m,i)=>{
          const active=modStep>i,done=phase==="done";
          return (
            <div key={i} style={{background:T.surface,borderRadius:8,padding:14,border:`1px solid ${active||done?m.color+"55":T.s2}`,borderTop:`2px solid ${active||done?m.color:T.s2}`,transition:"border 0.4s"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
                <div style={{fontSize:9,fontWeight:800,color:m.color,fontFamily:FM}}>{m.n}</div>
                <Pill label={done?"COMPLETE":active?"ACTIVE":"STANDBY"} color={done?m.color:active?T.orange:T.muted} pulse={active&&!done} small/>
              </div>
              <div style={{fontSize:11.5,fontWeight:700,color:T.text,fontFamily:F,marginBottom:5,lineHeight:1.3}}>{m.name}</div>
              <div style={{fontSize:9,color:T.textDim,fontFamily:FM,marginBottom:active||done?9:0,lineHeight:1.5}}>{m.desc}</div>
              {(active||done)&&<div style={{background:T.s2,borderRadius:5,padding:"7px 9px",marginBottom:7}}><div style={{fontSize:17,fontWeight:800,color:m.color,fontFamily:F,lineHeight:1}}>{m.metric}</div><div style={{fontSize:7.5,color:T.muted,fontFamily:FM,marginTop:2}}>{m.metricSub}</div></div>}
              <div style={{fontSize:8.5,fontFamily:FM,display:"flex",alignItems:"center",gap:5,color:done?m.color:active?T.orange:T.muted}}>
                {active&&!done&&<div style={{width:4,height:4,borderRadius:"50%",background:T.orange,animation:"pulse 1s infinite",flexShrink:0}}/>}

              </div>

      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>

        {[
          {title:"⚠  Without coordination",sub:"Single-site tools · each site responds independently",color:T.red,data:rebSlice,label:`+${reboundPct}%`,chips:["All sites shifted to 10pm simultaneously","Load diversity destroyed",`Overnight spike +${reboundPct}% above original peak`],chipCol:T.red},
          {title:"✦  Cadence — staggered dispatch",sub:"Fleet coordinated · unique deferral windows assigned",color:T.blue,data:cadSlice,label:`−${peakSavedMW} MW`,chips:[`Peak reduced −${peakSavedMW} MW`,"Load diversity preserved","Zero overnight rebound"],chipCol:T.teal},
        ].map((panel,idx)=>(
          <div key={idx} style={{background:T.surface,borderRadius:8,padding:14,border:`1px solid ${T.s2}`,borderTop:`2px solid ${panel.color}`}}>
            <div style={{marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:700,color:panel.color,fontFamily:F}}>{panel.title}</div>
              <div style={{fontSize:9,color:T.muted,fontFamily:FM,marginTop:2}}>{panel.sub}</div>

              const W=480,H=130,pad={t:10,r:8,b:22,l:34};
              const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b,min=50,max=130;
              const tx=i=>pad.l+(i/23)*cw,ty=v=>pad.t+((max-v)/(max-min))*ch;
              const mkP=vals=>vals.map((v,i)=>`${i===0?"M":"L"}${tx(i).toFixed(1)},${ty(v).toFixed(1)}`).join(" ");
              const annIdx=idx===0?22:18,annY=idx===0?REBOUND[22]:CADENCE[18];

                  {[70,90,110].map(v=><text key={v} x={pad.l-3} y={ty(v)+3} fontSize="8" fill={T.muted} textAnchor="end" fontFamily={FM}>{v}</text>)}
                  {[0,6,12,18,23].map(i=><text key={i} x={tx(i)} y={H-3} fontSize="8" fill={T.muted} textAnchor="middle" fontFamily={FM}>{H24[i]}</text>)}
                  {idx===0?<rect x={tx(21)} y={pad.t} width={tx(23)-tx(21)} height={ch} fill={T.red} fillOpacity=".1"/>:<rect x={tx(16)} y={pad.t} width={tx(20)-tx(16)} height={ch} fill={T.orange} fillOpacity=".07"/>}
                  <path d={mkP(BASE)} fill="none" stroke={T.s3} strokeWidth="1.2" strokeDasharray="4,3"/>
                  {chartPct>0&&<path d={mkP(panel.data)} fill="none" stroke={panel.color} strokeWidth="2.2" strokeLinecap="round"/>}
                  {phase==="done"&&<>
                    <line x1={tx(annIdx)} y1={ty(annY)} x2={tx(annIdx)} y2={ty(idx===0?MAX_BASE:CADENCE[annIdx])} stroke={panel.color} strokeWidth="1" strokeDasharray="3,2" opacity="0.7"/>
                    <text x={tx(annIdx)+4} y={ty(annY)-4} fontSize="9" fill={panel.color} fontFamily={FM} fontWeight="700">{panel.label}</text>
                  </>}
                </svg>
              );
            })()}
            {phase==="done"&&<div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:8}}>{panel.chips.map((t,i)=><div key={i} style={{fontSize:8.5,color:panel.chipCol,background:`${panel.chipCol}10`,padding:"2px 8px",borderRadius:4,fontFamily:FM}}>{idx===0?"✗":"✓"} {t}</div>)}</div>}

        </div>
        <div style={{display:"flex",gap:2,background:T.s2,borderRadius:7,padding:3}}>
          {["today","month","year"].map(p=><button key={p} onClick={()=>setPeriod(p)} style={{background:period===p?T.s3:"transparent",border:"none",cursor:"pointer",borderRadius:5,padding:"6px 14px",fontSize:9.5,fontWeight:600,color:period===p?T.text:T.muted,fontFamily:FM,transition:"all 0.15s",textTransform:"uppercase"}}>{p}</button>)}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}}>
        {[
          {v:fmtK(totalSavings),l:"Demand charge savings",s:"Fleet-wide reduction",c:T.blue,tag:"$10K/mo + 12.5% revenue share"},
          {v:fmtK(totalFee),l:"Cadence platform revenue",s:"Net ARR contribution",c:T.green,tag:"Revenue share model"},
          {v:period==="year"?"$165K+":"Coming Yr 2",l:"Capacity market revenue",s:"FERC Order 2222 pathway",c:T.purple,tag:"PJM RPM enrollment"},
        ].map((k,i)=>(
          <div key={i} style={{background:T.surface,borderRadius:8,padding:16,border:`1px solid ${T.s2}`,borderTop:`2px solid ${k.c}`}}>
            <div style={{fontSize:28,fontWeight:800,color:k.c,fontFamily:F,lineHeight:1}}>{k.v}</div>
            <div style={{fontSize:11,fontWeight:600,color:T.text,fontFamily:F,marginTop:7}}>{k.l}</div>
            <div style={{fontSize:9,color:T.muted,fontFamily:FM,marginTop:2}}>{k.s}</div>
            <div style={{marginTop:7,fontSize:8,color:k.c,fontFamily:FM,background:`${k.c}15`,padding:"2px 8px",borderRadius:4,display:"inline-block"}}>{k.tag}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
        <div style={{background:T.surface,borderRadius:8,border:`1px solid ${T.s2}`,padding:16}}>
          <div style={{fontSize:9,color:T.muted,fontFamily:FM,letterSpacing:1.5,marginBottom:10}}>SITE BREAKDOWN</div>
          <div style={{background:T.s2,borderRadius:5,padding:"6px 10px",display:"grid",gridTemplateColumns:"1fr 80px 80px 50px",gap:4,marginBottom:5}}>
            {["Site","Savings","Platform fee","Status"].map(h=><span key={h} style={{fontSize:8,fontWeight:700,color:T.muted,fontFamily:FM}}>{h}</span>)}
          </div>
          {siteData.map((s,i)=>(
            <div key={i} style={{padding:"7px 10px",display:"grid",gridTemplateColumns:"1fr 80px 80px 50px",gap:4,alignItems:"center",borderBottom:i<siteData.length-1?`1px solid ${T.s2}`:"none"}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:5,height:5,borderRadius:"50%",background:s.color,flexShrink:0}}/>
                <span style={{fontSize:10,color:T.text,fontFamily:F,fontWeight:600}}>{s.name}</span>
              </div>
              <span style={{fontSize:10,color:T.blue,fontFamily:FM}}>{fmtK(Number(s.savings))}</span>
              <span style={{fontSize:10,color:T.green,fontFamily:FM,fontWeight:700}}>{fmtK(Number(s.fee))}</span>
              <Pill label="LIVE" color={T.green} small/>
            </div>
          ))}
          <div style={{marginTop:10,padding:"9px 10px",background:T.s2,borderRadius:5,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:10,fontWeight:700,color:T.text,fontFamily:F}}>Fleet ARR (5 sites)</span>
            <span style={{fontSize:16,fontWeight:800,color:T.blue,fontFamily:F}}>${(enrolledARR/1000).toFixed(1)}M</span>
          </div>
        </div>
        <div style={{background:T.surface,borderRadius:8,border:`1px solid ${T.s2}`,padding:16}}>
          <div style={{fontSize:9,color:T.muted,fontFamily:FM,letterSpacing:1.5,marginBottom:10}}>ARR TRAJECTORY — 5-YEAR PATH</div>
          {arr5yr.map(({yr,val,sites,c,note},i)=>(
            <div key={i} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                <span style={{fontSize:9,color:T.muted,fontFamily:FM}}>{yr} · {note}</span>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <span style={{fontSize:8.5,color:T.muted,fontFamily:FM}}>{sites} sites</span>
                  <span style={{fontSize:12,fontWeight:700,color:c,fontFamily:F}}>${val}M</span>
                </div>
              </div>
              <div style={{height:5,background:T.s2,borderRadius:3,overflow:"hidden"}}>
                <div style={{width:`${(val/60)*100}%`,height:"100%",background:c,borderRadius:3}}/>
              </div>
            </div>
          ))}
          <div style={{marginTop:14,padding:"13px",background:`${T.gold}12`,borderRadius:6,border:`1px solid ${T.gold}30`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:8.5,color:T.gold,fontFamily:FM,letterSpacing:1,marginBottom:3}}>EXIT THESIS</div>
              <div style={{fontSize:24,fontWeight:800,color:T.gold,fontFamily:F}}>$480–600M</div>
            </div>
            <div style={{fontSize:9,color:T.muted,fontFamily:FM,textAlign:"right",lineHeight:1.7}}>$60M ARR × 8–10×<br/>Voltus comp ~$400M<br/>Utilities + infra PE</div>
          </div>
        </div>
      </div>
      <DispatchCalendar/>
    </div>
  );
}

function Engine() {
  const [expanded,setExpanded]=useState(null);
  return (
    <div style={{padding:22,overflowY:"auto",height:"calc(100vh - 50px)"}}>
      <div style={{marginBottom:14}}>
        <div style={{fontSize:9.5,color:T.muted,fontFamily:FM,letterSpacing:2,marginBottom:4}}>ENGINE ARCHITECTURE</div>
        <div style={{fontSize:20,fontWeight:700,color:T.text,fontFamily:F}}>Fleet Coordination Engine</div>
        <div style={{fontSize:10.5,color:T.muted,fontFamily:FM,marginTop:2}}>Four proprietary modules · Build, not integrate · Click any module to expand</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
        {MODULES.map((m,i)=>{
          const open=expanded===i;
          return (
            <div key={i} onClick={()=>setExpanded(open?null:i)} style={{background:T.surface,borderRadius:8,padding:18,cursor:"pointer",border:`1px solid ${open?m.color+"60":T.s2}`,borderTop:`3px solid ${m.color}`,transition:"border 0.2s"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{fontSize:11,fontWeight:800,color:m.color,fontFamily:FM}}>{m.n}</div>
                  <div style={{fontSize:13,fontWeight:700,color:T.text,fontFamily:F}}>{m.name}</div>
                </div>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <Pill label={m.status} color={m.status==="ACTIVE"?T.green:T.muted} pulse={m.status==="ACTIVE"} small/>
                  <span style={{fontSize:12,color:T.muted,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s",display:"inline-block"}}>▾</span>
                </div>
              </div>
              <div style={{fontSize:10,color:T.textDim,fontFamily:FM,lineHeight:1.6,marginBottom:10}}>{m.desc}</div>
              {!open&&<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{m.specs.slice(0,2).map(({k,v})=><div key={k} style={{background:T.s2,borderRadius:4,padding:"4px 9px",display:"flex",gap:5,alignItems:"center"}}><span style={{fontSize:8,color:T.muted,fontFamily:FM}}>{k}</span><span style={{fontSize:9,fontWeight:700,color:m.color,fontFamily:FM}}>{v}</span></div>)}</div>}
              {open&&<div>
                <div style={{fontSize:10,color:T.muted,fontFamily:FM,lineHeight:1.7,marginBottom:12,paddingTop:10,borderTop:`1px solid ${T.s2}`}}>{m.detail}</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                  {m.specs.map(({k,v})=><div key={k} style={{background:T.s2,borderRadius:5,padding:"8px 10px"}}><div style={{fontSize:8,color:T.muted,fontFamily:FM}}>{k}</div><div style={{fontSize:13,fontWeight:700,color:m.color,fontFamily:F,marginTop:2}}>{v}</div></div>)}
                </div>
              </div>}
            </div>
          );
        })}
      </div>
      <div style={{background:T.surface,borderRadius:8,padding:"14px 18px",border:`1px solid ${T.blue}40`,display:"grid",gridTemplateColumns:"auto 1px 1fr",gap:16,alignItems:"center"}}>
        <div>
          <div style={{fontSize:9,color:T.blueLt,fontFamily:FM,letterSpacing:1,marginBottom:3}}>ARCHITECTURAL MOAT</div>
          <div style={{fontSize:16,fontWeight:800,color:T.blue,fontFamily:F}}>Fleet-level visibility</div>
        </div>
        <div style={{background:T.s2,height:40}}/>
        <div style={{fontSize:10,color:T.textDim,fontFamily:FM,lineHeight:1.7}}>All four modules operate across the entire enrolled fleet simultaneously. Single-site tools cannot be upgraded to provide this — it requires fleet-level visibility as a core architectural property, not a feature add-on.</div>
      </div>
    </div>
  );
}

const NAV=[{id:"fleet",label:"Fleet",sub:"Command Center",icon:"◉"},{id:"dispatch",label:"Dispatch",sub:"Grid Engine",icon:"⚡"},{id:"revenue",label:"Revenue",sub:"Earnings",icon:"≡"},{id:"engine",label:"Engine",sub:"Architecture",icon:"⊞"}];

function Sidebar({screen,setScreen}) {
  return (
    <aside style={{width:196,background:T.surface,borderRight:`1px solid ${T.s2}`,display:"flex",flexDirection:"column",flexShrink:0}}>
      <div style={{padding:"15px 16px 14px",borderBottom:`1px solid ${T.s2}`,background:T.navy}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <CadenceLogo size={30} dark={true}/>
          <div>
            <div style={{fontSize:15,fontWeight:800,color:T.text,fontFamily:F,lineHeight:1,letterSpacing:-0.3}}>Cadence<span style={{color:T.blueLt}}>.</span></div>
            <div style={{fontSize:8,color:T.blueLt,fontFamily:FM,marginTop:2,opacity:0.8}}>v0.1 · beta</div>
          </div>
        </div>
      </div>
      <nav style={{padding:"8px",flex:1}}>
        <div style={{fontSize:8,color:T.muted,fontFamily:FM,letterSpacing:1.5,padding:"8px 8px 4px"}}>PLATFORM</div>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setScreen(n.id)} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"9px 10px",borderRadius:7,cursor:"pointer",textAlign:"left",background:screen===n.id?`${T.blue}20`:"transparent",border:`1px solid ${screen===n.id?T.blue+"50":"transparent"}`,marginBottom:2,transition:"all 0.15s"}}>
            <span style={{fontSize:14,color:screen===n.id?T.teal:T.muted,lineHeight:1,flexShrink:0}}>{n.icon}</span>
            <div>
              <div style={{fontSize:11.5,fontWeight:600,fontFamily:F,lineHeight:1,color:screen===n.id?T.text:T.muted}}>{n.label}</div>
              <div style={{fontSize:8.5,color:T.muted,fontFamily:FM,marginTop:1}}>{n.sub}</div>
            </div>
          </button>
        ))}
      </nav>
      <div style={{padding:"12px 16px",borderTop:`1px solid ${T.s2}`}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
          <div style={{width:6,height:6,borderRadius:"50%",background:T.green,boxShadow:`0 0 6px ${T.green}`}}/>
          <span style={{fontSize:9,color:T.blueLt,fontFamily:FM}}>5 sites online</span>
        </div>
        <div style={{fontSize:9,color:T.muted,fontFamily:FM}}>PJM · Ashburn corridor</div>
        <div style={{fontSize:12,fontWeight:700,color:T.blueLt,fontFamily:FM,marginTop:4}}>$329/MW-day</div>
      </div>
    </aside>
  );
}

function App() {
  const [screen,setScreen]=useState("fleet");
  return (
    <div style={{height:"100vh",background:T.bg,color:T.text,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <header style={{height:50,background:T.surface,borderBottom:`1px solid ${T.s2}`,display:"flex",alignItems:"center",padding:"0 20px",gap:12,flexShrink:0,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}><CadenceLogo size={20} dark={true}/><span style={{fontSize:10,color:T.muted,fontFamily:FM}}>Ashburn · PJM territory · 5 sites enrolled</span></div>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:10}}>
          <Pill label="PJM LIVE" color={T.blueLt} pulse/>
          <div style={{background:T.s2,borderRadius:5,padding:"3px 10px",fontSize:10,color:T.gold,fontFamily:FM}}>$329/MW-day</div>
          <div style={{background:T.s2,borderRadius:5,padding:"3px 10px",fontSize:10,color:T.red,fontFamily:FM}}>8-yr queue</div>
          <div style={{background:T.s2,borderRadius:5,padding:"3px 10px",fontSize:10,color:T.blueLt,fontFamily:FM}}>26% of VA grid</div>
        </div>
      </header>
      <div style={{display:"flex",flex:1,overflow:"hidden"}}>
        <Sidebar screen={screen} setScreen={setScreen}/>
        <main style={{flex:1,overflow:"hidden",background:T.bg}}>
          {screen==="fleet"    && <Fleet/>}
          {screen==="dispatch" && <Dispatch/>}
          {screen==="revenue"  && <Revenue/>}
          {screen==="engine"   && <Engine/>}
        </main>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
