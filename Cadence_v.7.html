let _lid = 0;
function CadenceLogo({ size=28, dark=false }) {
  const idRef = useRef(null);
  if (!idRef.current) idRef.current = `cl${++_lid}`;
  const id = idRef.current;
  const col = dark ? T.blueLt : T.navy;
  const sw = size*0.118, r = size*0.275, d = size*0.225, m = size/2;
  const rings = [{x:m,y:m-d},{x:m+d,y:m},{x:m,y:m+d},{x:m-d,y:m}];
  const cr = r + sw*0.5;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} fill="none" style={{display:"block",flexShrink:0}}>
      <defs>{rings.map((rg,i)=><clipPath key={i} id={`${id}${i}`}><circle cx={rg.x} cy={rg.y} r={cr}/></clipPath>)}</defs>
      {rings.map((rg,i)=><circle key={`b${i}`} cx={rg.x} cy={rg.y} r={r} stroke={col} strokeWidth={sw}/>)}
      {rings.map((rg,i)=><circle key={`w${i}`} cx={rg.x} cy={rg.y} r={r} stroke={col} strokeWidth={sw} clipPath={`url(#${id}${(i+1)%4})`}/>)}
    </svg>
  );
}

function LineChart({datasets,h=150,zones=false}) {
  const W=520,H=h,pad={t:10,r:10,b:24,l:36};
  const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b,min=50,max=130;
  const tx=i=>pad.l+(i/23)*cw, ty=v=>pad.t+((max-v)/(max-min))*ch;
  const mkP=vals=>vals.map((v,i)=>`${i===0?"M":"L"}${tx(i).toFixed(1)},${ty(v).toFixed(1)}`).join(" ");
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
      {[70,90,110].map(v=><line key={v} x1={pad.l} x2={W-pad.r} y1={ty(v)} y2={ty(v)} stroke={T.s3} strokeWidth="0.6"/>)}
      {[70,90,110].map(v=><text key={v} x={pad.l-4} y={ty(v)+4} fontSize="8" fill={T.muted} textAnchor="end" fontFamily={FM}>{v}</text>)}
      {[0,4,8,12,16,20,23].map(i=><text key={i} x={tx(i)} y={H-3} fontSize="8" fill={T.muted} textAnchor="middle" fontFamily={FM}>{H24[i]}</text>)}
      {zones&&<>
        <rect x={tx(16)} y={pad.t} width={tx(20)-tx(16)} height={ch} fill={T.orange} fillOpacity=".06"/>
        <text x={(tx(16)+tx(20))/2} y={pad.t+10} fontSize="7" fill={T.orange} fillOpacity=".7" textAnchor="middle" fontFamily={FM}>PEAK</text>
        <rect x={tx(21)} y={pad.t} width={tx(23)-tx(21)} height={ch} fill={T.red} fillOpacity=".06"/>
        <text x={(tx(21)+tx(23))/2} y={pad.t+10} fontSize="7" fill={T.red} fillOpacity=".6" textAnchor="middle" fontFamily={FM}>REBOUND</text>
      </>}
      {datasets.map((ds,i)=>(
        <path key={i} d={mkP(ds.values)} fill="none" stroke={ds.color} strokeWidth={ds.bold?2.5:1.5}
          strokeLinecap="round" strokeDasharray={ds.dashed?"5,3":"none"}/>
      ))}
    </svg>
  );
}

function GanttChart({windows,label,labelColor,startHour=18,endHour=34}) {
  const px=h=>((h-startHour)/(endHour-startHour))*100;
  const ticks=[18,20,22,0,2,4,6,8,10];
  const fmt=h=>h===0?"12am":h<12?`${h}am`:h===12?"12pm":h>12?`${h-12}pm`:`${h}pm`;
  return (
    <div>
      <div style={{fontSize:9,fontWeight:700,color:labelColor||T.muted,fontFamily:FM,letterSpacing:1,marginBottom:6}}>{label}</div>
      <div style={{position:"relative",height:14,marginBottom:8}}>
        {ticks.map(h=>{const ha=h<18?h+24:h;return(
          <div key={h} style={{position:"absolute",left:`${px(ha)}%`,transform:"translateX(-50%)",fontSize:7,color:T.muted,fontFamily:FM,borderLeft:`1px solid ${T.s3}`,paddingLeft:2}}>{fmt(h)}</div>
        );})}
      </div>
      {windows.map((w,i)=>{
        const sa=w.start<18?w.start+24:w.start,ea=w.end<18?w.end+24:w.end;
        const left=px(sa),width=Math.max(px(ea)-left,0.5);
        return (
          <div key={i} style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
            <div style={{width:110,display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
              <div style={{width:5,height:5,borderRadius:"50%",background:w.color,flexShrink:0}}/>
              <span style={{fontSize:7.5,color:T.textDim,fontFamily:FM,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{w.site}</span>
            </div>
            <div style={{flex:1,position:"relative",height:17,background:T.s2,borderRadius:3}}>
              <div style={{position:"absolute",left:`${left}%`,width:`${width}%`,height:"100%",
                background:`${w.color}28`,border:`1px solid ${w.color}`,borderRadius:3,
                display:"flex",alignItems:"center",justifyContent:"center"}}>
                <span style={{fontSize:7,color:w.color,fontFamily:FM,fontWeight:600,whiteSpace:"nowrap"}}>{w.mw}MW</span>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ══ SCREEN 1: FLEET ════════════════════════════════════════════════════════
function Fleet() {
  const [liveSites,setLiveSites]=useState(SITES.map(s=>({...s,liveLoad:s.load,liveBess:s.bess})));
  const [savings,setSavings]=useState(11847);
  useEffect(()=>{
    const t=setInterval(()=>{
      setLiveSites(prev=>prev.map(s=>{
        const drift=Math.round((Math.random()-.5)*4);
        const nl=Math.max(s.load-4,Math.min(s.load+4,s.liveLoad+drift));
        const bs=s.bessMax>0?Math.round((Math.random()-.5)*.5):0;
        return {...s,liveLoad:nl,liveBess:Math.max(30,Math.min(98,s.liveBess+bs))};
      }));
      setSavings(p=>p+Math.floor(Math.random()*6+2));
    },2800);
    return ()=>clearInterval(t);
  },[]);

  const totalLiveLoad=liveSites.reduce((s,x)=>s+x.liveLoad,0);
  const totalFlex=liveSites.reduce((s,x)=>s+x.flex,0);

        </div>

      {/* KPI strip */}

            <div style={{fontSize:11,fontWeight:600,color:T.text,fontFamily:F,marginTop:5}}>{k.l}</div>
            <div style={{fontSize:9,color:T.muted,fontFamily:FM,marginTop:2}}>{k.s}</div>

      <div style={{background:T.surface,borderRadius:8,border:`1px solid ${T.teal}30`,padding:"12px 16px",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>

          <div style={{display:"flex",gap:16}}>
            {[{v:`${totalFlex} MW`,l:"Committed MW",c:T.teal},{v:"4–12 hrs",l:"Horizon",c:T.blue},{v:"87%",l:"Confidence",c:T.green}].map((m,i)=>(

                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,marginBottom:s.bessMax>0?5:0}}>
                  {[{l:"Load",v:`${s.liveLoad}MW`,c:null},{l:"Flex",v:`${s.flex}MW`,c:T.teal}].map(m=>(
                    <div key={m.l} style={{background:T.s2,borderRadius:4,padding:"3px 6px"}}>

          {[{l:"Peak reduction",v:"−21 MW",c:T.teal},{l:"Savings today",v:fmtS(savings),c:T.green},{l:"Rebound risk",v:"Eliminated",c:T.green}].map((s,i)=>(

// ══ SCREEN 2: DISPATCH ════════════════════════════════════════════════════
function Dispatch() {
  const timerRef=useRef(null);
  const [phase,setPhase]=useState("idle");
  const [countdown,setCountdown]=useState(5);
  const [chartPct,setChartPct]=useState(0);
  const [modStep,setModStep]=useState(0);
  useEffect(()=>()=>clearInterval(timerRef.current),[]);

  const reset=()=>{clearInterval(timerRef.current);setPhase("idle");setCountdown(5);setChartPct(0);setModStep(0);};
  const trigger=()=>{
    if(phase!=="idle") return;
    setPhase("alert");
    let c=5;
    timerRef.current=setInterval(()=>{
      c--;setCountdown(c);
      if(c<=0){
        clearInterval(timerRef.current);
        setPhase("dispatching");
        MODULES.forEach((_,i)=>setTimeout(()=>setModStep(i+1),i*380));
        setTimeout(()=>{
          let p=0;
          timerRef.current=setInterval(()=>{p+=2;setChartPct(p);if(p>=100){clearInterval(timerRef.current);setPhase("done");}},40);
        },1700);
      }
    },1000);
  };

  const reboundPct=Math.round((Math.max(...REBOUND)/MAX_BASE-1)*100);
  const peakSavedMW=MAX_BASE-Math.max(...CADENCE.slice(16,21));
  const count=Math.max(2,Math.floor(chartPct/100*23)+1);
  const rebSlice=REBOUND.slice(0,count),cadSlice=CADENCE.slice(0,count);
  const totalFlex=SITES.reduce((s,x)=>s+x.flex,0);

  return (
    <div style={{padding:22,overflowY:"auto",height:"calc(100vh - 50px)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:14}}>
        <div>
          <div style={{fontSize:9.5,color:T.muted,fontFamily:FM,letterSpacing:2,marginBottom:4}}>DISPATCH ENGINE</div>
          <div style={{fontSize:20,fontWeight:700,color:T.text,fontFamily:F}}>Grid Event Response</div>
          <div style={{fontSize:10.5,color:T.muted,fontFamily:FM,marginTop:2}}>OR-Tools constraint solver · 5-site stagger · PJM M&V compliant</div>
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <div style={{background:phase==="idle"?T.surface:`${T.red}18`,border:`1px solid ${phase==="idle"?T.s2:T.red}`,
            borderRadius:8,padding:"8px 14px",transition:"all 0.4s",minWidth:100,textAlign:"center"}}>
            <div style={{fontSize:8.5,color:T.muted,fontFamily:FM,marginBottom:2}}>PJM LMP</div>
            <div style={{fontSize:20,fontWeight:800,fontFamily:F,color:phase==="idle"?T.gold:T.red,transition:"color 0.4s"}}>
              {phase==="idle"?"$329":"$847"}<span style={{fontSize:10,color:T.muted}}>/MWh</span>
            </div>
          </div>
          <Pill label={phase==="idle"?"GRID NORMAL":phase==="done"?"DISPATCH COMPLETE":phase==="alert"?"STRESS SIGNAL":"DISPATCHING"}
            color={phase==="idle"?T.green:phase==="done"?T.teal:T.red} pulse={phase==="alert"||phase==="dispatching"}/>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:12}}>
        {MODULES.map((m,i)=>{
          const active=modStep>i,done=phase==="done";
          return (
            <div key={i} style={{background:T.surface,borderRadius:8,padding:14,
              border:`1px solid ${active||done?m.color+"55":T.s2}`,borderTop:`2px solid ${active||done?m.color:T.s2}`,transition:"border 0.4s"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
                <div style={{fontSize:9,fontWeight:800,color:m.color,fontFamily:FM}}>{m.n}</div>
                <Pill label={done?"COMPLETE":active?"ACTIVE":"STANDBY"} color={done?m.color:active?T.orange:T.muted} pulse={active&&!done} small/>
              </div>
              <div style={{fontSize:11.5,fontWeight:700,color:T.text,fontFamily:F,marginBottom:5,lineHeight:1.3}}>{m.name}</div>
              <div style={{fontSize:9,color:T.textDim,fontFamily:FM,marginBottom:active||done?9:0,lineHeight:1.5}}>{m.desc}</div>
              {(active||done)&&(
                <div style={{background:T.s2,borderRadius:5,padding:"7px 9px",marginBottom:7}}>
                  <div style={{fontSize:17,fontWeight:800,color:m.color,fontFamily:F,lineHeight:1}}>{m.metric}</div>
                  <div style={{fontSize:7.5,color:T.muted,fontFamily:FM,marginTop:2}}>{m.metricSub}</div>
                </div>
              )}
              <div style={{fontSize:8.5,fontFamily:FM,display:"flex",alignItems:"center",gap:5,color:done?m.color:active?T.orange:T.muted}}>
                {active&&!done&&<div style={{width:4,height:4,borderRadius:"50%",background:T.orange,animation:"pulse 1s infinite",flexShrink:0}}/>}
                {done?m.done:active?m.active:m.idle}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
        <button onClick={trigger} disabled={phase!=="idle"} style={{
          background:phase==="idle"?`${T.orange}18`:T.s2,border:`1px solid ${phase==="idle"?T.orange:T.s3}`,
          borderRadius:8,padding:"10px 22px",cursor:phase==="idle"?"pointer":"not-allowed",
          color:phase==="idle"?T.orange:T.muted,fontSize:12,fontWeight:700,fontFamily:F,transition:"all 0.2s"}}>
          {phase==="idle"?"▶  Simulate PJM grid stress event":phase==="alert"?`⚠  Stress signal dispatching in ${countdown}s…`:phase==="dispatching"?"⚡  Fleet coordination active…":"✓  Dispatch complete"}
        </button>
        {phase==="done"&&<button onClick={reset} style={{background:T.s2,border:`1px solid ${T.s3}`,borderRadius:8,padding:"10px 16px",cursor:"pointer",color:T.muted,fontSize:11,fontFamily:F,fontWeight:600}}>↺ Reset</button>}
        {phase==="done"&&(
          <div style={{marginLeft:"auto",display:"flex",gap:16}}>
            <div style={{textAlign:"right"}}><div style={{fontSize:8,color:T.muted,fontFamily:FM}}>Uncoordinated rebound</div><div style={{fontSize:20,fontWeight:800,color:T.red,fontFamily:F}}>+{reboundPct}%</div></div>
            <div style={{textAlign:"right"}}><div style={{fontSize:8,color:T.muted,fontFamily:FM}}>Cadence peak reduction</div><div style={{fontSize:20,fontWeight:800,color:T.teal,fontFamily:F}}>−{peakSavedMW} MW</div></div>
            <div style={{textAlign:"right"}}><div style={{fontSize:8,color:T.muted,fontFamily:FM}}>Fleet dispatched</div><div style={{fontSize:20,fontWeight:800,color:T.green,fontFamily:F}}>{totalFlex} MW</div></div>
          </div>
        )}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        {[
          {title:"⚠  Without coordination",sub:"Single-site tools · 5 sites respond simultaneously",color:T.red,data:rebSlice,label:`+${reboundPct}%`,annIdx:22,annVals:REBOUND,chips:["All 5 sites pile into 10pm–midnight","Load diversity destroyed",`Overnight rebound +${reboundPct}% above peak`],chipCol:T.red},
          {title:"✦  Cadence — staggered dispatch",sub:"OR-Tools assigns 10 unique windows · 10-hour spread",color:T.teal,data:cadSlice,label:`−${peakSavedMW} MW`,annIdx:18,annVals:CADENCE,chips:[`Peak reduced −${peakSavedMW} MW`,"Load diversity preserved","Zero overnight rebound · ramp limit held"],chipCol:T.teal},
        ].map((panel,idx)=>(
          <div key={idx} style={{background:T.surface,borderRadius:8,padding:14,border:`1px solid ${T.s2}`,borderTop:`2px solid ${panel.color}`}}>
            <div style={{marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:700,color:panel.color,fontFamily:F}}>{panel.title}</div>
              <div style={{fontSize:9,color:T.muted,fontFamily:FM,marginTop:2}}>{panel.sub}</div>
            </div>
            {(()=>{
              const W=480,H=130,pad={t:10,r:8,b:22,l:34};
              const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b,min=50,max=130;
              const tx=i=>pad.l+(i/23)*cw,ty=v=>pad.t+((max-v)/(max-min))*ch;
              const mkP=vals=>vals.map((v,i)=>`${i===0?"M":"L"}${tx(i).toFixed(1)},${ty(v).toFixed(1)}`).join(" ");
              const annV=panel.annVals[panel.annIdx];
              return (
                <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
                  {[70,90,110].map(v=><line key={v} x1={pad.l} x2={W-pad.r} y1={ty(v)} y2={ty(v)} stroke={T.s3} strokeWidth="0.6"/>)}
                  {[70,90,110].map(v=><text key={v} x={pad.l-3} y={ty(v)+3} fontSize="8" fill={T.muted} textAnchor="end" fontFamily={FM}>{v}</text>)}
                  {[0,6,12,18,23].map(i=><text key={i} x={tx(i)} y={H-3} fontSize="8" fill={T.muted} textAnchor="middle" fontFamily={FM}>{H24[i]}</text>)}
                  {idx===0?<rect x={tx(21)} y={pad.t} width={tx(23)-tx(21)} height={ch} fill={T.red} fillOpacity=".1"/>
                    :<rect x={tx(16)} y={pad.t} width={tx(20)-tx(16)} height={ch} fill={T.orange} fillOpacity=".07"/>}
                  <path d={mkP(BASE)} fill="none" stroke={T.s3} strokeWidth="1.2" strokeDasharray="4,3"/>
                  {chartPct>0&&<path d={mkP(panel.data)} fill="none" stroke={panel.color} strokeWidth="2.2" strokeLinecap="round"/>}
                  {phase==="done"&&<>
                    <line x1={tx(panel.annIdx)} y1={ty(annV)} x2={tx(panel.annIdx)} y2={ty(idx===0?MAX_BASE:CADENCE[panel.annIdx])} stroke={panel.color} strokeWidth="1" strokeDasharray="3,2" opacity="0.7"/>
                    <text x={tx(panel.annIdx)+4} y={ty(annV)-4} fontSize="9" fill={panel.color} fontFamily={FM} fontWeight="700">{panel.label}</text>
                  </>}
                </svg>
              );
            })()}
            {phase==="done"&&(
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:8}}>
                {panel.chips.map((t,i)=><div key={i} style={{fontSize:8.5,color:panel.chipCol,background:`${panel.chipCol}10`,padding:"2px 8px",borderRadius:4,fontFamily:FM}}>{idx===0?"✗":"✓"} {t}</div>)}
              </div>
            )}
          </div>
        ))}
      </div>

      {phase==="done"&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
